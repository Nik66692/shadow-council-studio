name: Cargo Lock Sync

on:
  pull_request:

permissions:
  contents: write
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Generate Cargo.lock
        run: cargo generate-lockfile --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit Cargo.lock when changed
        run: |
          if ! git diff --quiet -- apps/desktop/src-tauri/Cargo.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/desktop/src-tauri/Cargo.lock
            git commit -m "fix(deps): add reproducible Rust lockfile"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
