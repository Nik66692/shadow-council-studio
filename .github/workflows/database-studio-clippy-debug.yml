name: Database Studio Clippy Debug

on:
  push:
    branches: [feat/database-studio-0.2]

permissions:
  contents: read

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Capture Clippy output
        shell: bash
        run: |
          set +e
          cargo clippy --locked --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings > database-studio-clippy.log 2>&1
          status=$?
          echo "$status" > database-studio-clippy.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: database-studio-clippy-log
          path: |
            database-studio-clippy.log
            database-studio-clippy.exit
