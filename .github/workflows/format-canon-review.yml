name: Format Canon Review

on:
  push:
    branches: [feat/canon-review-phase-1-5]
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "docs/architecture/adr/ADR-0010-canon-review-and-approval-registry.md"
      - ".github/workflows/format-canon-review.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/canon-review-phase-1-5
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format TypeScript, CSS and documentation
        run: pnpm format
      - name: Format Rust
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit formatting
        shell: bash
        run: |
          rm .github/workflows/format-canon-review.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes were required"
            exit 0
          fi
          git commit -m "style: format Canon Review implementation"
          git push origin HEAD:feat/canon-review-phase-1-5
