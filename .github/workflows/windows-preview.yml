name: Windows Preview

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "docs/canon/source/**"
      - ".github/workflows/windows-preview.yml"
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "docs/canon/source/**"
      - ".github/workflows/windows-preview.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-canon-review:
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/canon-review-phase-1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/canon-review-phase-1-5
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt
      - name: Apply reviewed fixes
        run: python3 .github/scripts/fix_canon_review_findings.py
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format sources
        run: |
          pnpm format
          cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit fixes and restore workflow
        shell: bash
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/windows-preview.yml
          rm -f .github/workflows/fix-canon-review-findings.yml
          rm -f .github/scripts/fix_canon_review_findings.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: enforce explicit canon review decisions"
          git push origin HEAD:feat/canon-review-phase-1-5

  build-windows-preview:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile
      - name: Build NSIS installer
        working-directory: apps/desktop
        run: pnpm dlx @tauri-apps/cli@2.7.0 build --bundles nsis
      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not produced" }
          $hash = Get-FileHash $installer.FullName -Algorithm SHA256
          "$($hash.Hash.ToLower()) *$($installer.Name)" | Set-Content "apps/desktop/src-tauri/target/release/bundle/nsis/SHA256SUMS.txt"
      - name: Upload Windows preview
        uses: actions/upload-artifact@v4
        with:
          name: shadow-council-studio-windows-preview-0.2.0
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
