name: Database Studio Rustfmt

on:
  push:
    branches: [feat/database-studio-0.2]

permissions:
  contents: write

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/database-studio-0.2
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt
      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit Rust formatting
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/desktop/src-tauri
            git commit -m "style(rust): format Database Studio"
            git push origin HEAD:feat/database-studio-0.2
          fi
