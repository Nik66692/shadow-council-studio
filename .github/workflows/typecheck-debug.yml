name: Typecheck Debug

on:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck output
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
      - name: Fail when typecheck failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: |
          cat typecheck.log
          exit 1
