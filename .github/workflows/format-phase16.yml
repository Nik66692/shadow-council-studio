name: Format Phase 1.6

on:
  push:
    branches: [feat/supabase-cloud-foundation-1.6]
    paths:
      - ".github/workflows/format-phase16.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/supabase-cloud-foundation-1.6
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt
      - run: pnpm install --frozen-lockfile
      - name: Format implementation sources
        run: |
          pnpm exec prettier --write apps packages docs scripts supabase package.json pnpm-lock.yaml
          cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps packages docs scripts supabase package.json pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Implementation sources are already formatted"
            exit 0
          fi
          git commit -m "style: format Supabase foundation sources"
          git push origin HEAD:feat/supabase-cloud-foundation-1.6
