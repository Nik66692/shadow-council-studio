name: Phase 1 Clippy Fix

on:
  pull_request:

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove test-only filesystem import from production scope
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('apps/desktop/src-tauri/src/canon_import.rs')
          text = path.read_text()
          old = 'use std::{fs, path::Path, process::Command};'
          if old not in text:
              raise SystemExit('expected import not found')
          text = text.replace(old, 'use std::{path::Path, process::Command};', 1)
          marker = 'mod tests {\n    use super::*;'
          replacement = 'mod tests {\n    use super::*;\n    use std::fs;'
          if marker not in text:
              raise SystemExit('test module marker not found')
          text = text.replace(marker, replacement, 1)
          path.write_text(text)
          PY
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt
      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit targeted fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src-tauri/src/canon_import.rs
          git commit -m "fix(rust): scope filesystem import to tests"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
