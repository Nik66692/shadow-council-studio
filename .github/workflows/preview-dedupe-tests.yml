name: Preview Dedupe Tests

on:
  push:
    branches: [release/preview-0.1.0]

permissions:
  contents: write

jobs:
  dedupe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/preview-0.1.0
          fetch-depth: 0
      - name: Keep one bundled-resource root test
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('apps/desktop/src-tauri/src/lib.rs')
          text = path.read_text()
          pattern = re.compile(
              r'\n    #\[test\]\n    fn content_root_prefers_repository_then_bundled_resources\(\) \{.*?\n    \}\n',
              re.DOTALL,
          )
          matches = list(pattern.finditer(text))
          if not matches:
              raise SystemExit('bundled-resource root test not found')
          if len(matches) > 1:
              first = matches[0].group(0)
              text = pattern.sub('', text)
              marker = '\n    #[tokio::test]\n    async fn repository_insert_read_source_document() {'
              if marker not in text:
                  raise SystemExit('repository test marker not found')
              text = text.replace(marker, first + marker, 1)
              path.write_text(text)
          PY
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt
      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit deduplicated test
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/desktop/src-tauri/src/lib.rs
            git commit -m "fix(preview): deduplicate bundled resource root test"
            git push origin HEAD:release/preview-0.1.0
          fi
