name: Preview Root Bootstrap

on:
  push:
    branches: [release/preview-0.1.0]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/preview-0.1.0
          fetch-depth: 0
      - name: Make canonical source root installation-aware
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/desktop/src-tauri/src/lib.rs')
          text = path.read_text()

          old_root = '''fn repo_root() -> PathBuf {
              PathBuf::from(env!("CARGO_MANIFEST_DIR")).join("../../..")
          }
          '''
          new_root = '''fn development_repo_root() -> PathBuf {
              PathBuf::from(env!("CARGO_MANIFEST_DIR")).join("../../..")
          }

          fn select_content_root(
              development_root: PathBuf,
              resource_root: Option<PathBuf>,
          ) -> PathBuf {
              if development_root
                  .join(SOURCE_MANIFEST_RELATIVE_PATH)
                  .is_file()
              {
                  development_root
              } else {
                  resource_root.unwrap_or(development_root)
              }
          }

          fn content_root(app: &tauri::AppHandle) -> PathBuf {
              select_content_root(
                  development_repo_root(),
                  app.path().resource_dir().ok(),
              )
          }
          '''
          if old_root in text:
              text = text.replace(old_root, new_root, 1)
          elif 'fn content_root(app: &tauri::AppHandle)' not in text:
              raise SystemExit('expected repo_root function not found')

          old_health = '''async fn get_system_health(app: tauri::AppHandle) -> Result<HealthStatus, AppError> {
              let pool = open_app_pool(&app).await?;
              build_health(&pool, &repo_root()).await
          }
          '''
          new_health = '''async fn get_system_health(app: tauri::AppHandle) -> Result<HealthStatus, AppError> {
              let pool = open_app_pool(&app).await?;
              let root = content_root(&app);
              build_health(&pool, &root).await
          }
          '''
          if old_health in text:
              text = text.replace(old_health, new_health, 1)

          old_import = '''async fn run_canon_import(app: tauri::AppHandle) -> Result<CanonImportReviewSnapshot, AppError> {
              let pool = open_app_pool(&app).await?;
              import_source(&pool, &repo_root()).await
          }
          '''
          new_import = '''async fn run_canon_import(app: tauri::AppHandle) -> Result<CanonImportReviewSnapshot, AppError> {
              let pool = open_app_pool(&app).await?;
              let root = content_root(&app);
              import_source(&pool, &root).await
          }
          '''
          if old_import in text:
              text = text.replace(old_import, new_import, 1)

          test_marker = '''    #[tokio::test]
              async fn repository_insert_read_source_document() {
          '''
          test_block = '''    #[test]
              fn content_root_prefers_repository_then_bundled_resources() {
                  let development = tempdir().unwrap();
                  let resources = tempdir().unwrap();
                  let development_root = development.path().to_path_buf();
                  let resource_root = resources.path().to_path_buf();

                  assert_eq!(
                      select_content_root(
                          development_root.clone(),
                          Some(resource_root.clone()),
                      ),
                      resource_root
                  );

                  let manifest = development_root.join(SOURCE_MANIFEST_RELATIVE_PATH);
                  fs::create_dir_all(manifest.parent().unwrap()).unwrap();
                  fs::write(manifest, "{}").unwrap();

                  assert_eq!(
                      select_content_root(
                          development_root.clone(),
                          Some(resource_root),
                      ),
                      development_root
                  );
              }

              #[tokio::test]
              async fn repository_insert_read_source_document() {
          '''
          if test_marker in text:
              text = text.replace(test_marker, test_block, 1)
          elif 'content_root_prefers_repository_then_bundled_resources' not in text:
              raise SystemExit('expected test insertion point not found')

          path.write_text(text)
          PY
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt
      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit root resolution
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/desktop/src-tauri/src/lib.rs
            git commit -m "fix(preview): resolve bundled canonical resources"
            git push origin HEAD:release/preview-0.1.0
          fi
