name: Sync UI Density Cargo Lock

on:
  push:
    branches: [feat/ui-density-0.3.2]
    paths:
      - ".github/workflows/sync-ui-density-cargo-lock.yml"

permissions:
  contents: write

jobs:
  sync-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ui-density-0.3.2
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Synchronize Cargo.lock
        run: cargo metadata --manifest-path apps/desktop/src-tauri/Cargo.toml --format-version 1 > /dev/null
      - name: Commit lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src-tauri/Cargo.lock
          if git diff --cached --quiet; then
            echo "Cargo.lock is already synchronized"
            exit 0
          fi
          git commit -m "release: synchronize 0.3.2 Cargo lockfile"
          git push origin HEAD:feat/ui-density-0.3.2
