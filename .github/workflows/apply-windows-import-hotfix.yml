name: Apply Windows Canon Import Hotfix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-windows-import-hotfix.yml"

permissions:
  contents: write

jobs:
  apply-hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/windows-canon-import-0.3.1
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt
      - name: Apply hotfix
        run: python3 .github/scripts/apply_windows_import_hotfix.py
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Synchronize Cargo lockfile
        run: cargo metadata --manifest-path apps/desktop/src-tauri/Cargo.toml --format-version 1 > /dev/null
      - name: Format sources
        run: |
          pnpm format
          cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Commit hotfix
        shell: bash
        run: |
          rm .github/workflows/apply-windows-import-hotfix.yml
          rm .github/scripts/apply_windows_import_hotfix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: read canonical DOCX natively on Windows"
          git push origin HEAD:hotfix/windows-canon-import-0.3.1
