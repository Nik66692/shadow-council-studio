name: Phase 1.6 Typecheck Debug

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/phase16-typecheck-debug.yml"
  push:
    branches: [feat/supabase-cloud-foundation-1.6]
    paths:
      - ".github/workflows/phase16-typecheck-debug.yml"

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/supabase-cloud-foundation-1.6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture desktop compiler diagnostics
        shell: bash
        run: |
          set +e
          pnpm --filter @shadow-council/desktop typecheck > typecheck.log 2>&1
          echo $? > typecheck.exit
          set -e
      - name: Upload compiler diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: phase16-typecheck-diagnostics
          path: |
            typecheck.log
            typecheck.exit
          if-no-files-found: error
      - name: Fail when compiler failed
        shell: bash
        run: test "$(cat typecheck.exit)" = "0"
